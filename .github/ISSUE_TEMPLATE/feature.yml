name: Feature request
description: Propose a source-backed improvement to the Skill or generated course
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: >-
        Security vulnerabilities must not be filed publicly. Report them through
        https://github.com/I0G4N/python-library-course-builder/security/advisories/new.
  - type: dropdown
    id: target_area
    attributes:
      label: Target area
      description: Select the part of the project the proposal would change.
      options:
        - Skill workflow or metadata
        - Course specification or scaffolder
        - Generated CLI or Web workspace
        - Grading or verification
        - Release tooling or documentation
        - Other
    validations:
      required: true
  - type: input
    id: version_or_commit
    attributes:
      label: Version or commit
      description: Identify the plugin version, release tag, or commit used for comparison.
      placeholder: v0.2.0 or a full commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the platforms, tools, and target-library versions relevant to the proposal.
    validations:
      required: true
  - type: textarea
    id: reproducible_evidence
    attributes:
      label: Reproducible evidence
      description: Show the current workflow or smallest example that demonstrates the limitation.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Describe the desired contract and learner or author outcome.
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: Describe the current behavior or missing capability.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: Add official-source links, alternatives considered, compatibility concerns, or other non-sensitive context.
    validations:
      required: false
