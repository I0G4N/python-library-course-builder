version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      root-python:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/plugins/python-library-course-builder/skills/building-python-library-courses/assets/course-template/platform"
    schedule:
      interval: "weekly"
    groups:
      template-python:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/plugins/python-library-course-builder/skills/building-python-library-courses/assets/course-template/platform"
    schedule:
      interval: "weekly"
    groups:
      template-node:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
